<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>InsightCX</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header>
    <h1>InsightCX</h1>
    <p>Every Voice. Every Insight.</p>
</header>

<nav>
    <a href="{{ url_for('index') }}">Dashboard</a>
</nav>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    &copy; 2026 InsightCX
</footer>

</body>
</html>
